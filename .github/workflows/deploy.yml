name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時只允許一個部署,排隊但不取消進行中的部署
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # 各示範站以各自的 base 路徑建置
      - run: npm run build:gallery
      - run: npm run build:sales
      - run: npm run build:booking
      - run: npm run build:portfolio

      # 組裝單一 dist:展示廊放根,各示範站放各自子資料夾
      # gallery → /、sales-web → /sales-web、booking-web → /booking-web、portfolio-web → /portfolio-web
      - name: Assemble site
        run: |
          rm -rf dist
          mkdir -p dist
          cp -r examples/gallery/dist/. dist/
          mkdir -p dist/sales-web
          cp -r examples/sales-web/dist/. dist/sales-web/
          mkdir -p dist/booking-web
          cp -r examples/booking-web/dist/. dist/booking-web/
          mkdir -p dist/portfolio-web
          cp -r examples/portfolio-web/dist/. dist/portfolio-web/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
